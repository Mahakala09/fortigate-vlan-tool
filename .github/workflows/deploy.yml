name: Deploy with Docker Compose

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 修正 Node.js 20 警告

      - name: Check docker-compose
        run: |
          # 同時支援 docker-compose 和 docker compose 兩種版本
          if command -v docker-compose &> /dev/null; then
            echo "COMPOSE_CMD=docker-compose" >> $GITHUB_ENV
          elif docker compose version &> /dev/null; then
            echo "COMPOSE_CMD=docker compose" >> $GITHUB_ENV
          else
            echo "❌ docker-compose not found, installing...."
            sudo apt-get update -y
            sudo apt-get install -y docker-compose-plugin
            echo "COMPOSE_CMD=docker compose" >> $GITHUB_ENV
          fi

      - name: Deploy
        run: |
          cd $GITHUB_WORKSPACE
          ${{ env.COMPOSE_CMD }} down --remove-orphans || true
          ${{ env.COMPOSE_CMD }} up -d --build
          echo "✅ 部署完成"

      - name: Clean up old images
        run: docker image prune -f

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:8080 > /dev/null && echo "✅ 服務正常" || echo "⚠️ 健康檢查失敗，請手動確認"
